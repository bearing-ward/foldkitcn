name: Deploy docs and registry

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Check out origin evidence
        run: git submodule update --init --depth 1 repos/base-ui repos/ui

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bun x playwright install --with-deps chromium

      - name: Verify registry artifacts
        run: bun run registry:check

      - name: Verify public parity contracts
        run: bun run parity:contracts

      - name: Build site for GitHub Pages
        run: FOLDKITCN_BASE_PATH=/${{ github.event.repository.name }}/ bun run build

      - name: Prerender docs routes
        run: FOLDKITCN_BASE_PATH=/${{ github.event.repository.name }}/ bun run docs:prerender

      - name: Build search index
        run: bun run docs:search

      - name: Smoke check build output
        run: |
          test -f dist/index.html
          test -f dist/components/shadcn/button/index.html
          test -f dist/r/registry.json
          test -f dist/r/shadcn-button.json

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        id: pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Check out origin evidence
        run: git submodule update --init --depth 1 repos/base-ui repos/ui

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bun x playwright install --with-deps chromium

      - name: Typecheck
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Browser parity tests
        run: bun run test:e2e

      - name: Lint and checks
        run: bun run check

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5

  smoke:
    if: github.event_name != 'pull_request'
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Smoke check public docs and registry
        env:
          PUBLIC_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          curl --fail --silent --show-error --retry 12 --retry-delay 5 --retry-all-errors "$PUBLIC_URL/"
          curl --fail --silent --show-error --retry 12 --retry-delay 5 --retry-all-errors "$PUBLIC_URL/components/shadcn/button/"
          curl --fail --silent --show-error --retry 12 --retry-delay 5 --retry-all-errors "$PUBLIC_URL/r/registry.json" | jq -e '.items | length > 0'
          curl --fail --silent --show-error --retry 12 --retry-delay 5 --retry-all-errors "$PUBLIC_URL/r/shadcn-button.json" | jq -e '.name == "shadcn-button"'
